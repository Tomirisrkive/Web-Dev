<h2>Album Detail</h2>

<div *ngIf="loading" class="info">Loading album...</div>
<div *ngIf="!loading && error" class="error">{{ error }}</div>

<section class="card" *ngIf="!loading && !error && album">
  <div class="row"><b>ID:</b> {{ album.id }}</div>
  <div class="row"><b>User ID:</b> {{ album.userId }}</div>

  <label class="label">
    <span>Title</span>
    <input class="input" [(ngModel)]="editedTitle" />
  </label>

  <div class="actions">
    <button class="btn primary" (click)="save()" [disabled]="saving">
      {{ saving ? 'Saving...' : 'Save' }}
    </button>

    <a class="btn" [routerLink]="['/albums', album.id, 'photos']">View Photos</a>

    <button class="btn" (click)="back()">Back</button>
  </div>
</section>

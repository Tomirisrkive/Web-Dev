<h2>Albums</h2>

<div *ngIf="albums$ | async as albums; else loading">

  <div *ngIf="albums.length === 0" class="info">
    No albums found.
  </div>

  <div class="list" *ngIf="albums.length > 0">

    <a class="item"
       *ngFor="let album of albums"
       [routerLink]="['/albums', album.id]">

      <div class="meta">
        <div class="id">#{{ album.id }}</div>
        <div class="title">{{ album.title }}</div>
      </div>

      <button class="danger"
              (click)="deleteAlbum(album.id, $event)">
        Delete
      </button>

    </a>

  </div>

</div>

<ng-template #loading>
  <div class="info">Loading albums...</div>
</ng-template>

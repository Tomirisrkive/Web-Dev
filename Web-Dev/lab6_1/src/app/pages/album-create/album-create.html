<h2>Create Album</h2>

<div *ngIf="error" class="error">
  {{ error }}
</div>

<div class="form">

  <label>User ID</label>
  <input type="number" [(ngModel)]="userId" name="userId">

  <label>Title</label>
  <input type="text" [(ngModel)]="title" name="title">

  <div class="buttons">

    <button type="button" (click)="createAlbum()">
      Create
    </button>

    <button type="button" (click)="cancel()">
      Cancel
    </button>

  </div>

</div>
